name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (x86_64, musl — fully static, runs everywhere)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: heist
            archive: heist-linux-x86_64.tar.gz

          # Linux (ARM64)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: heist
            archive: heist-linux-aarch64.tar.gz

          # macOS (Intel)
          - target: x86_64-apple-darwin
            os: macos-13
            binary: heist
            archive: heist-macos-x86_64.tar.gz

          # macOS (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: heist
            archive: heist-macos-aarch64.tar.gz

          # Windows (x86_64)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: heist.exe
            archive: heist-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl cross-compilation needs the musl target + linker
      - name: Install musl tools (Linux only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools

      - name: Install ARM64 cross-compiler (Linux ARM64 only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}
          cd -
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ../../../${{ matrix.archive }}
          cd -
          (Get-FileHash ${{ matrix.archive }} -Algorithm SHA256).Hash.ToLower() + "  " + "${{ matrix.archive }}" |
            Out-File -Encoding ascii ${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            heist-linux-x86_64.tar.gz
            heist-linux-x86_64.tar.gz.sha256
            heist-linux-aarch64.tar.gz
            heist-linux-aarch64.tar.gz.sha256
            heist-macos-x86_64.tar.gz
            heist-macos-x86_64.tar.gz.sha256
            heist-macos-aarch64.tar.gz
            heist-macos-aarch64.tar.gz.sha256
            heist-windows-x86_64.zip
            heist-windows-x86_64.zip.sha256
